<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — Synthetic Monitoring Alert System</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
        colors: {
          brand: { 500: '#2563eb', 600: '#1d4ed8' }, // Professional blue
        }
      }
    }
  }
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body { 
    background-color: #f5f7fa; 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    color: #1e293b; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh; 
    margin: 0; 
  }
  .login-card { 
    background: #ffffff; 
    border: 1px solid #e2e8f0; 
    border-radius: 16px; 
    padding: 48px 40px; 
    width: 100%; 
    max-width: 440px; 
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01); 
    text-align: center; 
  }
  .btn-google { 
    background: #ffffff; 
    color: #334155; 
    border: 1px solid #cbd5e1; 
    border-radius: 8px; 
    padding: 12px 24px; 
    font-size: 15px; 
    font-weight: 600; 
    cursor: pointer; 
    transition: all 0.2s ease-in-out; 
    display: inline-flex; 
    align-items: center; 
    justify-content: center; 
    gap: 12px; 
    width: 100%; 
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .btn-google:hover { 
    background: #f8fafc; 
    border-color: #94a3b8; 
    color: #0f172a;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.025);
  }
  .link { 
    color: #2563eb; 
    text-decoration: none; 
    font-weight: 500;
    transition: color 0.2s; 
  }
  .link:hover { 
    color: #1d4ed8; 
    text-decoration: underline; 
  }
</style>
</head>
<body>
  <div class="login-card">
    <!-- Logo -->
    <img src="{{ url_for('static', filename='logo.png') }}" alt="garudAA logo" class="w-56 mx-auto mb-6 object-contain">
    
    <!-- Welcome Text -->
    <h1 class="text-2xl font-bold text-slate-800 mb-2">Welcome Back</h1>
    <p class="text-sm text-slate-500 mb-8 leading-relaxed">Sign in to the Synthetic Monitoring Alert System to access your dashboard.</p>
    
    <!-- Google Login Button -->
    <a href="{{ url_for('auth.auth_login') }}" class="btn-google">
      <svg viewBox="0 0 24 24" width="22" height="22" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        <path d="M1 1h22v22H1z" fill="none"/>
      </svg>
      Sign in with Google
    </a>

    <!-- Footer links -->
    <div class="mt-8 text-sm text-slate-500">
      Need help? <a href="https://accounts.google.com/signin/recovery" target="_blank" class="link">Forgot Password</a>
    </div>
  </div>
</body>
</html>
